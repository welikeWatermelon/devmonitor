<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevMonitor</title>
  <link rel="stylesheet" href="./node_modules/xterm/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Bar -->
  <div id="topbar">
    <div class="topbar-left">
      <span class="app-name">DevMonitor</span>
      <span id="connection-status" class="status-dot disconnected"></span>
      <span id="connection-text">끊김</span>
    </div>
    <div class="topbar-center">
      <div class="mode-toggle">
        <button id="mode-a" class="mode-btn active">A</button>
        <button id="mode-b" class="mode-btn">B</button>
      </div>
      <button id="action-btn" class="action-btn">붙여넣기</button>
    </div>
    <div class="topbar-right">
      <button id="build-btn" class="icon-btn" title="빌드 시작" style="font-size:13px;">🔨 빌드</button>
      <span id="deploy-badge" style="font-size:11px;color:#6c7086;padding:0 6px;align-self:center;"></span>
      <button id="notification-toggle" class="icon-btn" title="알림 ON/OFF">🔔</button>
      <button id="settings-btn" class="icon-btn" title="설정">⚙️</button>
    </div>
  </div>

  <!-- Main Container -->
  <div id="main-container">
    <!-- Left Column -->
    <div id="left-column">
      <div id="sector1" class="sector">
        <div class="sector-header">Claude Code</div>
        <div id="terminal1" class="terminal-container"></div>
      </div>
      <div id="error-panel" class="sector">
        <div class="sector-header" style="display:flex;align-items:center;justify-content:space-between;">
          <span>에러 분석 로그</span>
          <div style="display:flex;gap:4px;">
            <button id="err-delete-selected" class="icon-btn" title="선택 삭제" style="font-size:11px;padding:2px 6px;">🗑 선택삭제</button>
            <button id="err-delete-all" class="icon-btn" title="전체 삭제" style="font-size:11px;padding:2px 6px;">🗑 전체삭제</button>
          </div>
        </div>
        <div id="error-filter-bar" style="display:flex;gap:6px;padding:6px 8px;background:#181825;border-bottom:1px solid #313244;flex-wrap:wrap;">
          <select id="filter-server" style="font-size:11px;background:#313244;color:#cdd6f4;border:none;border-radius:4px;padding:2px 6px;">
            <option value="ALL">전체 서버</option>
          </select>
          <select id="filter-type" style="font-size:11px;background:#313244;color:#cdd6f4;border:none;border-radius:4px;padding:2px 6px;">
            <option value="ALL">전체 에러</option>
          </select>
          <select id="filter-date" style="font-size:11px;background:#313244;color:#cdd6f4;border:none;border-radius:4px;padding:2px 6px;">
            <option value="ALL">전체 날짜</option>
            <option value="TODAY">오늘</option>
            <option value="WEEK">이번 주</option>
          </select>
          <button id="filter-reset" style="font-size:11px;background:#45475a;color:#cdd6f4;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;">초기화</button>
        </div>
        <div id="error-list" style="overflow-y:auto;flex:1;">
          <div class="err-section-title">🔴 미해결</div>
          <div id="error-list-unresolved"></div>
          <div class="err-section-title" style="margin-top:8px;">✅ 해결완료</div>
          <div id="error-list-resolved"></div>
        </div>
      </div>
    </div>

    <!-- Right Column -->
    <div id="right-column">
      <div id="sector2" class="sector">
        <div class="sector-header single-fallback hidden" id="sector2-header-single">서버 로그</div>
        <div class="sector-header-tabs" id="sector2-header-tabs">
          <div class="tab-bar" id="log-tab-bar"></div>
        </div>
        <div id="tab-add-form" class="tab-add-form">
          <div class="tab-form-inner">
            <div class="tab-form-title">서버 추가</div>
            <div class="tab-form-row">
              <label>ID</label>
              <input type="text" id="tab-srv-id" placeholder="backend">
            </div>
            <div class="tab-form-row">
              <label>이름</label>
              <input type="text" id="tab-srv-name" placeholder="백엔드">
            </div>
            <div class="tab-form-row">
              <label>PEM 경로</label>
              <input type="text" id="tab-srv-pem" placeholder="PEM 경로">
            </div>
            <div class="tab-form-row">
              <label>EC2 IP</label>
              <input type="text" id="tab-srv-ip" placeholder="13.125.xxx.xxx">
            </div>
            <div class="tab-form-row">
              <label>사용자명</label>
              <input type="text" id="tab-srv-user" placeholder="ec2-user" value="ec2-user">
            </div>
            <div class="tab-form-row">
              <label>포트</label>
              <input type="number" id="tab-srv-port" placeholder="22" value="22">
            </div>
            <div class="tab-form-row">
              <label>로그 경로</label>
              <input type="text" id="tab-srv-log" placeholder="/home/ec2-user/app/logs/spring.log">
            </div>
            <div class="tab-form-row">
              <label>로컬 경로</label>
              <input type="text" id="tab-srv-local" placeholder="로컬 경로">
            </div>
            <div id="tab-form-errors" class="tab-form-errors"></div>
            <div class="tab-form-actions">
              <button id="tab-form-cancel" class="tab-form-btn cancel">취소</button>
              <button id="tab-form-submit" class="tab-form-btn submit">추가</button>
            </div>
          </div>
        </div>
        <div id="terminal2" class="terminal-container"></div>
      </div>
      <div id="sector3" class="sector">
        <div class="sector-header single-fallback hidden" id="sector3-header-single">서버 현황</div>
        <div class="sector-header-tabs" id="sector3-header-tabs">
          <div class="tab-bar" id="btop-tab-bar"></div>
        </div>
        <div id="sector3-subtabs" style="display:flex;gap:4px;padding:4px 8px;background:#181825;border-bottom:1px solid #313244;">
          <button class="s3-tab active" data-panel="dashboard">📊 대시보드</button>
          <button class="s3-tab" data-panel="btop">🖥 btop</button>
        </div>
        <div id="panel-dashboard" class="s3-panel">
          <div id="dashboard-grid"></div>
          <button id="dashboard-refresh" style="margin:8px;padding:4px 12px;font-size:12px;cursor:pointer;background:#313244;color:#cdd6f4;border:none;border-radius:4px;">🔄 새로고침</button>
        </div>
        <div id="panel-btop" class="s3-panel hidden">
          <div id="terminal3" class="terminal-container"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Popup -->
  <div id="settings-popup" class="popup hidden">
    <div class="popup-header">
      <span>설정</span>
      <button id="settings-close" class="popup-close">&times;</button>
    </div>
    <div class="popup-body">
      <div class="settings-section-title">프로젝트 경로</div>
      <div class="settings-project-path">
        <input type="text" id="settings-project-path" placeholder="로컬 프로젝트 경로 (예: C:\Projects\myapp)">
        <button id="settings-project-path-save" class="settings-add-btn" style="margin-top:4px;">저장</button>
      </div>
      <div class="settings-section-title" style="margin-top:12px;">서버 목록</div>
      <div id="server-list"></div>
      <button id="settings-add-server" class="settings-add-btn">+ 서버 추가 ▼</button>
      <div id="settings-add-form" class="settings-accordion"></div>
      <div id="settings-errors" class="settings-errors"></div>
      <div class="settings-section-title" style="margin-top:16px;">빌드 / 배포 설정</div>
      <div class="settings-row" style="margin-bottom:6px;">
        <label style="font-size:12px;color:#cdd6f4;">OS</label>
        <select id="settings-os" style="width:100%;margin-top:2px;padding:4px;background:#313244;color:#cdd6f4;border:1px solid #585b70;border-radius:4px;">
          <option value="windows">Windows</option>
          <option value="mac">Mac</option>
        </select>
      </div>
      <div class="settings-row" style="margin-bottom:6px;">
        <label style="font-size:12px;color:#cdd6f4;">배포 방식</label>
        <select id="settings-deploy-mode" style="width:100%;margin-top:2px;padding:4px;background:#313244;color:#cdd6f4;border:1px solid #585b70;border-radius:4px;">
          <option value="direct">직접 전송 (로컬 빌드 → SCP → EC2 재시작)</option>
          <option value="github">GitHub Actions (git push)</option>
        </select>
      </div>
      <div class="settings-row" style="margin-bottom:6px;">
        <label style="font-size:12px;color:#cdd6f4;">빌드 명령</label>
        <input type="text" id="settings-build-command" placeholder=".\mvnw.cmd clean package -DskipTests" style="width:100%;margin-top:2px;">
      </div>
      <div class="settings-row" style="margin-bottom:6px;">
        <label style="font-size:12px;color:#cdd6f4;">빌드 작업 디렉터리</label>
        <input type="text" id="settings-build-dir" placeholder="C:\Projects\myapp\backend" style="width:100%;margin-top:2px;">
      </div>
      <div id="deploy-direct-fields">
        <div class="settings-row" style="margin-bottom:6px;">
          <label style="font-size:12px;color:#cdd6f4;">빌드된 jar 절대경로</label>
          <input type="text" id="settings-build-jar" placeholder="C:\...\target\demo-0.0.1-SNAPSHOT.jar" style="width:100%;margin-top:2px;">
        </div>
        <div class="settings-row" style="margin-bottom:6px;">
          <label style="font-size:12px;color:#cdd6f4;">배포 대상 서버</label>
          <select id="settings-deploy-server" style="width:100%;margin-top:2px;padding:4px;background:#313244;color:#cdd6f4;border:1px solid #585b70;border-radius:4px;"></select>
        </div>
        <div class="settings-row" style="margin-bottom:6px;">
          <label style="font-size:12px;color:#cdd6f4;">EC2 재시작 명령</label>
          <input type="text" id="settings-ec2-restart" placeholder="docker restart backend" style="width:100%;margin-top:2px;">
        </div>
      </div>
      <div id="deploy-github-fields" style="display:none;">
        <div class="settings-row" style="margin-bottom:6px;">
          <label style="font-size:12px;color:#cdd6f4;">git 작업 디렉터리</label>
          <input type="text" id="settings-git-dir" placeholder="C:\Projects\myapp (비우면 빌드 디렉터리 사용)" style="width:100%;margin-top:2px;">
        </div>
      </div>
      <button id="settings-build-save" class="settings-add-btn" style="margin-top:6px;">저장</button>

      <div class="settings-section-title" style="margin-top:16px;">자동 분석 리포트 (C 기능)</div>
      <div style="font-size:12px;color:#888;margin-bottom:8px;">
        주기적으로 에러를 집계해 Claude Code에 분석 요청.<br>
        결과는 메뉴 → 분석 리포트에서 확인.
      </div>
      <div class="settings-row" style="margin-bottom:6px;">
        <label style="font-size:12px;color:#cdd6f4;display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="settings-auto-report-enabled">
          자동 분석 활성화
        </label>
      </div>
      <div class="settings-row" style="margin-bottom:6px;">
        <label style="font-size:12px;color:#cdd6f4;">분석 주기</label>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
          <input type="number" id="settings-auto-report-hours" value="24" min="1" max="168"
            style="width:70px;padding:4px;background:#313244;color:#cdd6f4;border:1px solid #585b70;border-radius:4px;">
          <span style="font-size:12px;color:#888;">시간마다</span>
        </div>
      </div>
      <button id="settings-report-save" class="settings-add-btn" style="margin-top:4px;">저장</button>

      <div class="settings-section-title" style="margin-top:16px;">Claude Code 권한 deny 규칙</div>
      <div style="font-size:12px;color:#888;margin-bottom:8px;">
        rm/systemctl stop/scp/sftp/sudo 등 시스템 변경 명령을 deny.<br>
        .claude/settings.local.json 에 추가됨. 기존 설정과 병합.
      </div>
      <div id="deny-rules-status" style="font-size:12px;color:#aaa;margin-bottom:6px;"></div>
      <button id="install-deny-rules-btn" class="settings-add-btn">안전 규칙 설치</button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="dist/renderer.js"></script>
</body>
</html>
